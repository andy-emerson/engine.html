<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<!-- Tombstone: the app is now index.html. Bounce stale bookmarks/caches that
     still point at engine.html back to the app. The ?v=1 query is a distinct
     cache key, so a browser holding a stale cached redirect can't loop here. -->
<meta http-equiv="refresh" content="0; url=index.html?v=1">
<title>LoveIDE</title>
</head>
<body>
<p>LoveIDE is now at <a href="index.html?v=1">index.html</a>…</p>
<script>location.replace('index.html?v=1');</script>
</body>
</html>
