<!DOCTYPE html>
<html lang="en" data-theme="auto">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Gamengine — LÖVE notebook IDE</title>
<!--
  Gamengine — a single-file, in-browser IDE for authoring LÖVE (Love2D) games.
  (The whole app is one file, engine.html.)

  main.lua IS the single source of truth; the notebook is a pure projection over
  it, and the file always stays a valid, runnable .lua. Design language and many
  component patterns are drawn from Neodide's notebook.html (the oracle): the
  theme system, layout, cell cards with badge type-switching, inter-cell insert
  zones, hover actions, collapse, Markdown WYSIWYG, CodeMirror 6 editing, and
  marked-based Markdown rendering — adapted from Python/SQL to Lua/LÖVE.

  The doc model (parse/serialize) and the love.js runtime are engine.html's own.
-->

<!-- marked.js for Markdown is loaded NON-blocking at boot (see loadMarked());
     a built-in renderer is used until/if it arrives, so the UI never waits on a CDN. -->

<!-- CodeMirror 6 — loaded on demand via dynamic import(); textarea fallback if offline -->
<script type="importmap">
{
  "imports": {
    "@codemirror/view":                "https://esm.sh/@codemirror/view@6",
    "@codemirror/state":               "https://esm.sh/@codemirror/state@6",
    "@codemirror/commands":            "https://esm.sh/@codemirror/commands@6",
    "@codemirror/language":            "https://esm.sh/@codemirror/language@6",
    "@codemirror/autocomplete":        "https://esm.sh/@codemirror/autocomplete@6",
    "@codemirror/legacy-modes/mode/lua": "https://esm.sh/@codemirror/legacy-modes@6/mode/lua",
    "@lezer/highlight":                "https://esm.sh/@lezer/highlight@1"
  }
}
</script>

<style>
/* ════════════════════════════════════════════════════════════════════════════
 * 1. BASE & RESET
 * ════════════════════════════════════════════════════════════════════════════ */
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
::-webkit-scrollbar { width: 7px; height: 7px; }
::-webkit-scrollbar-track { background: transparent; }
::-webkit-scrollbar-thumb { background: var(--border-medium); border-radius: 99px; }
* { scrollbar-color: var(--border-medium) transparent; scrollbar-width: thin; }

/* ════════════════════════════════════════════════════════════════════════════
 * 2. THEME VARIABLES  (ported from the oracle)
 * ════════════════════════════════════════════════════════════════════════════ */
:root {
  --font-sans: 'Segoe UI', system-ui, -apple-system, sans-serif;
  --font-mono: 'Cascadia Code', 'JetBrains Mono', 'Fira Code', 'Consolas', monospace;
  --radius-md: 8px;
  --radius-lg: 12px;

  --fn-execute: #3b7dd8; --fn-execute-bg: rgba(59,125,216,.12); --fn-execute-border: rgba(59,125,216,.35);
  --fn-success: #1e8a3e; --fn-success-bg: rgba(30,138,62,.11);
  --fn-danger:  #d73a49; --fn-danger-bg:  rgba(215,58,73,.11);
  --fn-working: #b07d00; --fn-working-bg: rgba(176,125,0,.13); --fn-working-border: rgba(176,125,0,.35);

  /* cell-type colors — Lua (LÖVE pink) + Markdown (terracotta) */
  --type-lua-bg: #FBE6F1; --type-lua-fg: #8C1A55;
  --type-md-bg:  #FAEAE4; --type-md-fg:  #7C2D12;
}
[data-theme="ember"], [data-theme="dusk"], [data-theme="carbon"] {
  --fn-execute: #6ba3e8; --fn-execute-bg: rgba(107,163,232,.15); --fn-execute-border: rgba(107,163,232,.40);
  --fn-success: #4cae64; --fn-success-bg: rgba(76,174,100,.15);
  --fn-danger:  #f07178; --fn-danger-bg:  rgba(240,113,120,.15);
  --fn-working: #e0b341; --fn-working-bg: rgba(224,179,65,.16); --fn-working-border: rgba(224,179,65,.40);
}
[data-theme="linen"] {
  --bg-primary:#f7f5f1; --bg-secondary:#edeae4; --bg-tertiary:#e3dcd4; --bg-info:#ece3d8;
  --text-primary:#2c2620; --text-secondary:#6a4e2e; --text-tertiary:#a09080;
  --text-info:#7a5c18; --text-danger:#904030; --text-success:#4e5e28;
  --border-faint:rgba(44,38,32,.10); --border-light:rgba(44,38,32,.18); --border-medium:rgba(44,38,32,.28); --border-info:#8a6838;
  --syntax-keyword:#7a5a10; --syntax-string:#8a4828; --syntax-operator:#7a6858;
}
[data-theme="slate"] {
  --bg-primary:#f2f4f0; --bg-secondary:#e7ece4; --bg-tertiary:#d8e0d4; --bg-info:#e0eadc;
  --text-primary:#26302a; --text-secondary:#486848; --text-tertiary:#88988a;
  --text-info:#387050; --text-danger:#884038; --text-success:#387040;
  --border-faint:rgba(38,48,42,.10); --border-light:rgba(38,48,42,.18); --border-medium:rgba(38,48,42,.28); --border-info:#487858;
  --syntax-keyword:#386050; --syntax-string:#806820; --syntax-operator:#6a7a6c;
}
[data-theme="ember"] {
  --bg-primary:#272220; --bg-secondary:#1e1b18; --bg-tertiary:#382e28; --bg-info:#382c1e;
  --text-primary:#c8bfb0; --text-secondary:#b09060; --text-tertiary:#786e60;
  --text-info:#c09030; --text-danger:#c86858; --text-success:#88a060;
  --border-faint:rgba(200,191,176,.10); --border-light:rgba(200,191,176,.18); --border-medium:rgba(200,191,176,.28); --border-info:#c09850;
  --syntax-keyword:#caa040; --syntax-string:#c07848; --syntax-operator:#a08870;
  --type-lua-bg:#3B0A2A; --type-lua-fg:#F49AC8; --type-md-bg:#3B0F0A; --type-md-fg:#F4A89A;
}
[data-theme="dusk"] {
  --bg-primary:#1f2120; --bg-secondary:#191919; --bg-tertiary:#272928; --bg-info:#21271f;
  --text-primary:#bec0b6; --text-secondary:#688060; --text-tertiary:#565a52;
  --text-info:#5a8050; --text-danger:#b07068; --text-success:#6a9050;
  --border-faint:rgba(190,192,182,.10); --border-light:rgba(190,192,182,.18); --border-medium:rgba(190,192,182,.28); --border-info:#587050;
  --syntax-keyword:#88a850; --syntax-string:#b0a040; --syntax-operator:#748060;
  --type-lua-bg:#2A0A22; --type-lua-fg:#E090BE; --type-md-bg:#3B0F0A; --type-md-fg:#F4A89A;
}
[data-theme="cloud"] {
  --bg-primary:#f5f5f5; --bg-secondary:#ebebeb; --bg-tertiary:#dcdcdc; --bg-info:#e4e4e4;
  --text-primary:#282828; --text-secondary:#585858; --text-tertiary:#989898;
  --text-info:#484848; --text-danger:#884040; --text-success:#487040;
  --border-faint:rgba(40,40,40,.10); --border-light:rgba(40,40,40,.18); --border-medium:rgba(40,40,40,.28); --border-info:#787878;
  --syntax-keyword:#181818; --syntax-string:#606060; --syntax-operator:#7a7a7a;
  --type-lua-bg:#e7e0e4; --type-lua-fg:#7a4860; --type-md-bg:#e8e0dc; --type-md-fg:#7a5048;
}
[data-theme="carbon"] {
  --bg-primary:#202020; --bg-secondary:#181818; --bg-tertiary:#2a2a2a; --bg-info:#242424;
  --text-primary:#c8c8c8; --text-secondary:#888888; --text-tertiary:#585858;
  --text-info:#a0a0a0; --text-danger:#c07878; --text-success:#80a878;
  --border-faint:rgba(200,200,200,.10); --border-light:rgba(200,200,200,.18); --border-medium:rgba(200,200,200,.28); --border-info:#808080;
  --syntax-keyword:#e0e0e0; --syntax-string:#a0a0a0; --syntax-operator:#787878;
  --type-lua-bg:#2c242a; --type-lua-fg:#c898b4; --type-md-bg:#2c2424; --type-md-fg:#c89898;
}

/* ════════════════════════════════════════════════════════════════════════════
 * 3. LAYOUT
 * ════════════════════════════════════════════════════════════════════════════ */
html, body { height: 100%; }
body { font-family: var(--font-sans); background: var(--bg-tertiary); color: var(--text-primary); transition: background .2s, color .2s; }
#app { display: flex; flex-direction: column; height: 100vh; overflow: hidden; }
#main-area { display: flex; flex: 1; min-height: 0; }

.activity-bar { width: 44px; flex-shrink: 0; display: flex; flex-direction: column; align-items: center; padding: 4px 0; background: var(--bg-secondary); z-index: 5; }
#left-activity-bar { border-right: .5px solid var(--border-faint); }
#right-activity-bar { border-left: .5px solid var(--border-faint); }
.activity-bar-btn { width: 44px; height: 42px; display: flex; align-items: center; justify-content: center; background: none; border: none; cursor: pointer; color: var(--text-tertiary); border-right: 2px solid transparent; transition: color .12s; }
#right-activity-bar .activity-bar-btn { border-right: none; border-left: 2px solid transparent; }
.activity-bar-btn:hover { color: var(--text-primary); }
.activity-bar-btn.active { color: var(--text-primary); border-right-color: var(--border-info); }
#right-activity-bar .activity-bar-btn.active { border-left-color: var(--border-info); border-right-color: transparent; }
.activity-bar-btn svg { width: 19px; height: 19px; }

#left-pane { width: 248px; flex-shrink: 0; display: flex; flex-direction: column; background: var(--bg-primary); overflow: hidden; transition: width .18s ease; }
#left-pane.collapsed { width: 0 !important; }
#right-pane { width: 40%; min-width: 280px; flex-shrink: 0; display: flex; flex-direction: column; background: var(--bg-primary); overflow: hidden; }
#right-pane.collapsed { width: 0 !important; min-width: 0; }

.pane-resizer { width: 9px; flex-shrink: 0; position: relative; cursor: col-resize; background: transparent; z-index: 10; }
.pane-resizer::before { content: ''; position: absolute; top: 0; bottom: 0; left: 50%; width: .5px; background: var(--border-faint); transition: background .15s; }
.pane-resizer:hover::before, .pane-resizer.dragging::before { background: var(--border-medium); }

/* ════════════════════════════════════════════════════════════════════════════
 * 4. TOPBAR
 * ════════════════════════════════════════════════════════════════════════════ */
.topbar { display: flex; align-items: center; gap: 6px; padding: 0 14px; background: var(--bg-primary); border-bottom: .5px solid var(--border-faint); flex-shrink: 0; height: 52px; }
.topbar-logo { display: flex; align-items: center; gap: 8px; margin-right: 8px; user-select: none; }
.topbar-logo .mark { width: 26px; height: 26px; color: var(--type-lua-fg); }
.topbar-logo .word { font-size: 19px; font-weight: 600; letter-spacing: .01em; }
.topbar-logo .word b { color: var(--type-lua-fg); font-weight: 700; }
.topbar-sep { flex: 1; }
.tb-group { display: flex; flex-direction: column; align-items: center; gap: 2px; }
.tb-group-btns { display: flex; align-items: center; gap: 2px; }
.tb-group-label { font-size: 9px; color: var(--text-tertiary); letter-spacing: .06em; text-transform: uppercase; line-height: 1; padding-bottom: 3px; }
.tb-divider { width: .5px; height: 28px; align-self: center; background: var(--border-faint); margin: 0 4px; }
.tb-btn { background: none; border: .5px solid var(--border-light); border-radius: var(--radius-md); padding: 6px 10px; font-size: 12px; font-family: var(--font-sans); color: var(--text-secondary); cursor: pointer; display: flex; align-items: center; gap: 5px; transition: background .12s, color .12s; white-space: nowrap; }
.tb-btn:hover { background: var(--bg-secondary); color: var(--text-primary); }
.tb-btn.primary { background: var(--fn-execute-bg); border-color: transparent; color: var(--fn-execute); }
.tb-btn.run { background: var(--type-lua-bg); border-color: transparent; color: var(--type-lua-fg); font-weight: 600; }
.tb-btn.run:hover { filter: brightness(.97); opacity: .92; }
.tb-btn.danger { background: var(--fn-danger-bg); border-color: transparent; color: var(--fn-danger); }
.tb-btn svg { width: 14px; height: 14px; flex-shrink: 0; }

/* ════════════════════════════════════════════════════════════════════════════
 * 5. STATUS BAR
 * ════════════════════════════════════════════════════════════════════════════ */
.status-bar { display: flex; align-items: center; height: 26px; flex-shrink: 0; background: var(--bg-secondary); border-top: .5px solid var(--border-faint); padding: 0 10px; gap: 6px; font-size: 11px; user-select: none; }
.status-item { display: flex; align-items: center; gap: 5px; padding: 2px 9px; border-radius: 99px; color: var(--text-tertiary); background: var(--bg-primary); border: .5px solid var(--border-faint); white-space: nowrap; transition: color .15s, background .15s, border-color .15s; }
.status-item svg { width: 11px; height: 11px; }
.status-item.working { color: var(--fn-working); background: var(--fn-working-bg); border-color: var(--fn-working-border); }
.status-item.ready { color: var(--fn-success); background: var(--fn-success-bg); border-color: transparent; }
.status-item.error { color: var(--fn-danger); background: var(--fn-danger-bg); border-color: transparent; }
.status-item.dirty { color: var(--fn-working); background: var(--fn-working-bg); border-color: var(--fn-working-border); }
.status-spacer { flex: 1; }
.status-link { cursor: pointer; }
.status-link:hover { color: var(--text-primary); }

/* ════════════════════════════════════════════════════════════════════════════
 * 6. NOTEBOOK + CELLS
 * ════════════════════════════════════════════════════════════════════════════ */
#nb-body { flex: 1; min-width: 0; overflow-y: auto; }
#nb-scroll { min-height: 100%; padding: 14px 0 40vh; max-width: 940px; margin: 0 auto; }

.cell { margin: 0 16px; position: relative; border-radius: var(--radius-lg); border: .5px solid var(--border-faint); background: var(--bg-primary); overflow: hidden; transition: border-color .15s; }
.cell.focused { border-color: var(--border-info); }
.cell-header { display: flex; align-items: center; gap: 7px; padding: 6px 11px; background: var(--bg-secondary); border-bottom: .5px solid var(--border-faint); position: relative; }
.cell-badge { font-size: 11px; font-weight: 600; padding: 4px 10px; border-radius: 99px; letter-spacing: .05em; text-transform: uppercase; display: flex; align-items: center; gap: 4px; flex-shrink: 0; cursor: pointer; border: 1px solid color-mix(in srgb, currentColor 30%, transparent); }
.cell-badge:hover { opacity: .82; }
.badge-lua { background: var(--type-lua-bg); color: var(--type-lua-fg); }
.badge-md { background: var(--type-md-bg); color: var(--type-md-fg); }
.cell-title { font-size: 11px; color: var(--text-tertiary); font-family: var(--font-mono); margin-right: auto; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
.cell-actions { display: flex; gap: 3px; opacity: 0; transition: opacity .15s; }
.cell:hover .cell-actions, .cell.focused .cell-actions { opacity: 1; }
.ca-btn { background: none; border: none; cursor: pointer; color: var(--text-secondary); padding: 3px 5px; border-radius: 5px; display: flex; align-items: center; transition: background .1s, color .1s; }
.ca-btn:hover { background: var(--bg-primary); color: var(--text-primary); }
.ca-btn.danger:hover { background: var(--fn-danger-bg); color: var(--fn-danger); }
.ca-btn:disabled { opacity: .3; cursor: default; }
.ca-btn svg { width: 16px; height: 16px; }

.cell-editor textarea { width: 100%; border: none; outline: none; resize: none; font-family: var(--font-mono); font-size: 13px; line-height: 1.65; padding: 11px 13px; background: var(--bg-primary); color: var(--text-primary); min-height: 52px; display: block; tab-size: 2; white-space: pre; overflow-x: auto; }
.cell-editor .cm-editor { height: auto; }
.cell-editor .cm-editor.cm-focused { outline: none; }
.cell-editor .cm-scroller { overflow-x: auto; font-family: var(--font-mono); }

/* collapse */
.cell.collapsed .cell-editor, .cell.collapsed .cell-output { display: none; }
.cell.collapsed .cell-header { border-bottom: none; }

/* markdown WYSIWYG */
.cell-output { font-size: 14px; line-height: 1.7; }
.cell.md-view .cell-editor { display: none; }
.cell.md-edit .cell-output { display: none; }
.cell.md-view .cell-output { cursor: text; padding: 6px 16px; }
.cell.md-view .cell-output:empty::before { content: 'Empty Markdown cell — click to edit…'; color: var(--text-tertiary); font-style: italic; }

/* type picker */
.type-picker { position: fixed; z-index: 1000; background: var(--bg-primary); border: .5px solid var(--border-medium); border-radius: var(--radius-md); padding: 4px; display: flex; flex-direction: column; gap: 2px; box-shadow: 0 4px 16px rgba(0,0,0,.14); min-width: 120px; }
.type-picker-btn { background: none; border: .5px solid transparent; border-radius: 6px; font-size: 11px; color: var(--text-secondary); padding: 5px 10px; cursor: pointer; display: flex; align-items: center; gap: 6px; text-align: left; }
.type-picker-btn:hover { background: var(--bg-secondary); color: var(--text-primary); }

/* inter-cell insert zone */
.cell-insert { height: 26px; display: flex; align-items: center; justify-content: center; gap: 6px; position: relative; margin: 0 16px; }
.cell-insert .insert-btn { opacity: 0; transition: opacity .15s; }
.cell-insert:hover .insert-btn { opacity: 1; }
.cell-insert::before { content: ''; position: absolute; left: 0; right: 0; top: 50%; height: .5px; background: var(--border-faint); opacity: 0; transition: opacity .15s; }
.cell-insert:hover::before { opacity: 1; }
.insert-btn { background: var(--bg-primary); border: .5px solid var(--border-light); border-radius: 99px; font-size: 11px; color: var(--text-tertiary); padding: 3px 11px; cursor: pointer; display: flex; align-items: center; gap: 5px; position: relative; z-index: 1; }
.insert-btn:hover { color: var(--text-primary); border-color: var(--border-medium); background: var(--bg-secondary); }
.insert-btn.type-lua:hover { color: var(--type-lua-fg); background: var(--type-lua-bg); border-color: color-mix(in srgb, currentColor 30%, transparent); }
.insert-btn.type-md:hover  { color: var(--type-md-fg);  background: var(--type-md-bg);  border-color: color-mix(in srgb, currentColor 30%, transparent); }
.insert-btn svg { width: 12px; height: 12px; }

/* ════════════════════════════════════════════════════════════════════════════
 * 7. PANELS (left pane)
 * ════════════════════════════════════════════════════════════════════════════ */
.pane-header { flex-shrink: 0; padding: 9px 14px; font-size: 10px; font-weight: 600; color: var(--text-secondary); text-transform: uppercase; letter-spacing: .06em; border-bottom: .5px solid var(--border-faint); background: var(--bg-secondary); display: flex; align-items: center; justify-content: space-between; }
.pane-header .mini { cursor: pointer; color: var(--text-tertiary); display: flex; }
.pane-header .mini:hover { color: var(--text-primary); }
.pane-panel { display: none; flex: 1; overflow-y: auto; flex-direction: column; }
.pane-panel.active { display: flex; }
.pane-empty { color: var(--text-tertiary); font-size: 12px; font-style: italic; padding: 12px 14px; }
.list-row { display: flex; align-items: center; gap: 8px; padding: 7px 14px; font-size: 12px; cursor: default; border-bottom: .5px solid var(--border-faint); }
.list-row:hover { background: var(--bg-secondary); }
.list-row .grow { flex: 1; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
.list-row .mono { font-family: var(--font-mono); }
.list-row .sub { color: var(--text-tertiary); font-size: 10px; }
.list-row .x { color: var(--text-tertiary); cursor: pointer; display: flex; }
.list-row .x:hover { color: var(--fn-danger); }
.list-row.clickable { cursor: pointer; }

/* settings (themes) */
.settings-body { padding: 14px; display: flex; flex-direction: column; gap: 16px; }
.settings-label { font-size: 10px; font-weight: 600; letter-spacing: .06em; text-transform: uppercase; color: var(--text-tertiary); margin-bottom: 7px; }
.seg { display: flex; gap: 4px; flex-wrap: wrap; }
.seg button { flex: 1; min-width: 56px; background: var(--bg-secondary); border: .5px solid var(--border-light); border-radius: 6px; color: var(--text-secondary); font-size: 11px; padding: 6px 8px; cursor: pointer; display: flex; align-items: center; justify-content: center; gap: 5px; }
.seg button.active { background: var(--fn-execute-bg); border-color: transparent; color: var(--fn-execute); }
.seg button:hover:not(.active) { color: var(--text-primary); }
.setting-toggle { display: flex; align-items: center; justify-content: space-between; font-size: 12px; color: var(--text-secondary); }

/* ════════════════════════════════════════════════════════════════════════════
 * 8. PREVIEW (right pane)
 * ════════════════════════════════════════════════════════════════════════════ */
#stage { flex: 1; min-height: 0; display: grid; place-items: center; position: relative; overflow: hidden; background: #0c0c0c; }
#stage iframe { border: 0; width: 100%; height: 100%; background: #000; }
#stage .placeholder { color: var(--text-tertiary); text-align: center; padding: 24px; max-width: 380px; line-height: 1.6; font-size: 13px; }
#stage .placeholder .big { color: var(--type-lua-fg); opacity: .5; margin-bottom: 10px; }
#stage .placeholder code { font-family: var(--font-mono); color: var(--type-lua-fg); }
#stage .placeholder b { color: var(--text-secondary); }
#console { height: 150px; flex-shrink: 0; overflow-y: auto; border-top: .5px solid var(--border-faint); background: var(--bg-secondary); font-family: var(--font-mono); font-size: 11.5px; line-height: 1.5; padding: 8px 12px; white-space: pre-wrap; }
#console.hidden { display: none; }
#console .err { color: var(--fn-danger); }
#console .ok { color: var(--fn-success); }
#console .dim { color: var(--text-tertiary); }
#console .warn { color: var(--fn-working); }

/* ════════════════════════════════════════════════════════════════════════════
 * 9. MARKDOWN OUTPUT  (ported from the oracle)
 * ════════════════════════════════════════════════════════════════════════════ */
.out-md { color: var(--text-primary); }
.out-md h1 { font-size: 22px; font-weight: 600; margin: 4px 0 12px; border-bottom: .5px solid var(--border-faint); padding-bottom: .2em; }
.out-md h2 { font-size: 17px; font-weight: 600; margin: 16px 0 7px; border-bottom: .5px solid var(--border-faint); padding-bottom: .2em; }
.out-md h3 { font-size: 14px; font-weight: 600; margin: 13px 0 5px; }
.out-md p { font-size: 14px; line-height: 1.7; margin-bottom: 9px; }
.out-md ul, .out-md ol { padding-left: 22px; font-size: 14px; margin-bottom: 9px; }

<script>
"use strict";
/* ════════════════════════════════════════════════════════════════════════════
 * 0. ICONS (inline SVG — no CDN dependency, unlike the oracle's icon webfont)
 * ════════════════════════════════════════════════════════════════════════════ */
const I = {
  play:'<polygon points="6 4 20 12 6 20 6 4"/>', stop:'<rect x="5" y="5" width="14" height="14" rx="2"/>',
  file:'<path d="M14 3v4a1 1 0 0 0 1 1h4"/><path d="M17 21H7a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h7l5 5v11a2 2 0 0 1-2 2z"/>',
  folder:'<path d="M5 4h4l3 3h7a1 1 0 0 1 1 1v9a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V6a2 2 0 0 1 2-2z"/>',
  save:'<path d="M6 4h11l3 3v11a2 2 0 0 1-2 2H6a2 2 0 0 1-2-2V6a2 2 0 0 1 2-2z"/><path d="M14 4v5H8V4"/><rect x="8" y="13" width="8" height="6"/>',
  download:'<path d="M4 17v2a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2v-2"/><path d="M7 11l5 5 5-5"/><path d="M12 4v12"/>',
  check:'<path d="M5 12l5 5L20 7"/>', collapse:'<path d="M8 8l4-4 4 4"/><path d="M16 16l-4 4-4-4"/>',
  plus:'<path d="M12 5v14M5 12h14"/>', trash:'<path d="M5 7h14M10 11v6M14 11v6M6 7l1 13a2 2 0 0 0 2 2h6a2 2 0 0 0 2-2l1-13M9 7V4h6v3"/>',
  up:'<path d="M12 19V5M6 11l6-6 6 6"/>', down:'<path d="M12 5v14M6 13l6 6 6-6"/>',
  code:'<path d="M8 9l-3 3 3 3M16 9l3 3-3 3M13 6l-2 12"/>', md:'<path d="M4 7v10M4 7l4 5 4-5M16 7v10M16 17l3-3M16 17l-3-3"/>',
  chevron:'<path d="M9 6l6 6-6 6"/>', assets:'<rect x="3" y="3" width="18" height="18" rx="2"/><path d="M3 15l5-5 4 4 3-3 6 6"/><circle cx="9" cy="9" r="1.5"/>',
  history:'<path d="M3 12a9 9 0 1 0 3-6.7L3 8"/><path d="M3 4v4h4M12 8v4l3 2"/>', settings:'<circle cx="12" cy="12" r="3"/><path d="M19 12a7 7 0 0 0-.1-1l2-1.6-2-3.4-2.3 1a7 7 0 0 0-1.7-1l-.4-2.5h-4l-.4 2.5a7 7 0 0 0-1.7 1l-2.3-1-2 3.4 2 1.6a7 7 0 0 0 0 2l-2 1.6 2 3.4 2.3-1a7 7 0 0 0 1.7 1l.4 2.5h4l.4-2.5a7 7 0 0 0 1.7-1l2.3 1 2-3.4-2-1.6c.06-.3.1-.6.1-1z"/>',
  terminal:'<path d="M5 7l5 5-5 5M13 17h6"/>', sun:'<circle cx="12" cy="12" r="4"/><path d="M12 2v2M12 20v2M4 12H2M22 12h-2M5 5l1.5 1.5M17.5 17.5L19 19M19 5l-1.5 1.5M6.5 17.5L5 19"/>',
  moon:'<path d="M21 12.8A9 9 0 1 1 11.2 3 7 7 0 0 0 21 12.8z"/>', auto:'<circle cx="12" cy="12" r="9"/><path d="M12 3v18" fill="currentColor" stroke="none" opacity="0.35"/>',
  dot:'<circle cx="12" cy="12" r="5"/>', love:'<path d="M12 21s-7-4.5-9.3-9C1 8.6 2.6 5 6 5c2 0 3.2 1.2 4 2.5C10.8 6.2 12 5 14 5c3.4 0 5 3.6 3.3 7-2.3 4.5-9.3 9-9.3 9z"/>',
};
function svg(name, cls) {
  return `<svg class="${cls||''}" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round">${I[name]||''}</svg>`;
}
function paintIcons(root=document) {
  root.querySelectorAll('[data-ico]').forEach(el => { el.innerHTML = svg(el.dataset.ico) + (el.childNodes.length && el.dataset.keep ? '' : ''); });
  // buttons keep their text: prepend icon
  root.querySelectorAll('.tb-btn[data-ico]').forEach(el => {
    if (el.querySelector('svg')) return;
    el.insertAdjacentHTML('afterbegin', svg(el.dataset.ico));
  });
}

const $ = s => document.querySelector(s);
const $$ = s => Array.from(document.querySelectorAll(s));
function elem(tag, props={}, kids=[]) {
  const n = document.createElement(tag);
  for (const k in props) {
    if (k === 'class') n.className = props[k];
    else if (k === 'html') n.innerHTML = props[k];
    else if (k === 'text') n.textContent = props[k];
    else if (k.startsWith('on') && typeof props[k] === 'function') n.addEventListener(k.slice(2), props[k]);
    else if (props[k] != null) n.setAttribute(k, props[k]);
  }
  (Array.isArray(kids) ? kids : [kids]).forEach(c => c != null && n.appendChild(typeof c === 'string' ? document.createTextNode(c) : c));
  return n;
}
let _uid = 0; const uid = () => ++_uid;
function toast(msg) { const t = $('#toast'); t.textContent = msg; t.classList.add('show'); clearTimeout(toast._t); toast._t = setTimeout(() => t.classList.remove('show'), 1600); }

/* ════════════════════════════════════════════════════════════════════════════
 * 1. DOC MODEL — main.lua is the single source of truth.
 *
 *   parse(lua) -> { cells:[{id,type,code,level,before}], trailing }
 *   serialize(doc) -> lua
 *
 *   - top-level column-0 standalone --[[ ]] (and --[==[ ]==]) -> 'md' cell
 *   - column-0 -- %% -> invisible code separator
 *   - everything else -> 'lua' cell
 *   - md<->lua toggle is just comment/uncomment (swap the type; content stays).
 *
 *   Idempotent: serialize(parse(file)) === file. Each cell stores verbatim glue
 *   (`before`) so whitespace/separators round-trip byte-for-byte; structural
 *   edits re-derive canonical glue via normalizeGlue().
 * ════════════════════════════════════════════════════════════════════════════ */
const SEP_RE = /^--\s?%%[ \t]*$/;
const OPEN_RE = /^--\[(=*)\[/;
const closeTok = l => ']' + '='.repeat(l) + ']';
const openTok = l => '--[' + '='.repeat(l) + '[';

function lineSpans(src) {
  const out = []; let i = 0;
  while (true) {
    const nl = src.indexOf('\n', i);
    if (nl < 0) { out.push({ s: i, e: src.length }); break; }
    out.push({ s: i, e: nl }); i = nl + 1;
    if (i > src.length) break;
    if (i === src.length) { out.push({ s: i, e: i }); break; }
  }
  return out;
}
function matchMarkdown(src, lines, li) {
  const ln = lines[li];
  const m = OPEN_RE.exec(src.slice(ln.s, ln.e));
  if (!m) return null;
  const level = m[1].length, ot = openTok(level), ct = closeTok(level);
  const innerStart = ln.s + ot.length;
  const idx = src.indexOf(ct, innerStart);
  if (idx < 0) return null;
  const end = idx + ct.length;
  if (end !== src.length && src[end] !== '\n') return null;
  return { level, innerStart, innerEnd: idx, end };
}
function parse(src) {
  src = String(src == null ? '' : src);
  const lines = lineSpans(src);
  const segs = []; let i = 0;
  while (i < lines.length) {
    const ln = lines[i];
    const md = matchMarkdown(src, lines, i);
    if (md) {
      segs.push({ type: 'md', start: ln.s, end: md.end, level: md.level, inner: src.slice(md.innerStart, md.innerEnd) });
      let k = i; while (k < lines.length && lines[k].e < md.end) k++; i = k + 1; continue;
    }
    const t = src.slice(ln.s, ln.e);
    if (SEP_RE.test(t)) { segs.push({ type: 'sep', start: ln.s, end: ln.e }); i++; continue; }
    let k = i;
    while (k < lines.length) {
      const lt = src.slice(lines[k].s, lines[k].e);
      if (SEP_RE.test(lt)) break;
      if (matchMarkdown(src, lines, k)) break;
      k++;
    }
    segs.push({ type: 'lua', start: lines[i].s, end: lines[k - 1].e }); i = k;
  }
  const cells = []; let glue = '', cursor = 0;
  for (const seg of segs) {
    glue += src.slice(cursor, seg.start);
    if (seg.type === 'sep') glue += src.slice(seg.start, seg.end);
    else if (seg.type === 'md') { cells.push({ id: uid(), type: 'md', code: seg.inner, level: seg.level, before: glue, collapsed: false }); glue = ''; }
    else { cells.push({ id: uid(), type: 'lua', code: src.slice(seg.start, seg.end), level: 0, before: glue, collapsed: false }); glue = ''; }
    cursor = seg.end;
  }
  glue += src.slice(cursor);
  return { cells, trailing: glue };
}
function cellBody(c) {
  if (c.type === 'lua') return c.code;
  let lvl = c.level | 0;
  while (c.code.indexOf(closeTok(lvl)) >= 0) lvl++;
  return openTok(lvl) + c.code + closeTok(lvl);
}
function serialize(doc) {
  let out = '';
  for (const c of doc.cells) out += c.before + cellBody(c);
  return out + (doc.trailing || '');
}
function normalizeGlue(doc) {
  doc.cells.forEach((c, k) => {
    if (k === 0) { c.before = ''; return; }
    const prev = doc.cells[k - 1];
    c.before = (prev.type === 'lua' && c.type === 'lua') ? '\n-- %%\n' : '\n';
  });
  if (doc.cells.length === 0) doc.trailing = '';
  else if (!/\n$/.test(doc.trailing || '')) doc.trailing = '\n';
}

/* ════════════════════════════════════════════════════════════════════════════
 * 2. MARKDOWN — marked.js when available, compact built-in fallback otherwise.
 * ════════════════════════════════════════════════════════════════════════════ */
function escapeHtml(s){ return s.replace(/[&<>"]/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c])); }
function mdInline(s){
  s = escapeHtml(s)
    .replace(/`([^`]+)`/g,'<code>$1</code>')
    .replace(/\*\*([^*]+)\*\*/g,'<strong>$1</strong>')
    .replace(/(^|[^*])\*([^*\n]+)\*/g,'$1<em>$2</em>')
    .replace(/\[([^\]]+)\]\(([^)\s]+)\)/g,'<a href="$2" target="_blank" rel="noopener">$1</a>');
  return s;
}
function fallbackMarkdown(src){
  const lines = String(src).replace(/\r\n?/g,'\n').split('\n');
  let html='', i=0;
  const brk = l => /^\s*$/.test(l)||/^#{1,6}\s+/.test(l)||/^\s*```/.test(l)||/^\s*[-*+]\s+/.test(l)||/^\s*\d+\.\s+/.test(l)||/^\s*>/.test(l)||/^\s*(-{3,}|\*{3,}|_{3,})\s*$/.test(l);
  while (i<lines.length){
    const line=lines[i];
    if (/^\s*```/.test(line)){ i++; const buf=[]; while(i<lines.length&&!/^\s*```/.test(lines[i])){buf.push(lines[i]);i++;} i++; html+='<pre><code>'+escapeHtml(buf.join('\n'))+'</code></pre>'; continue; }
    let h=/^(#{1,6})\s+(.*)$/.exec(line);
    if (h){ const l=h[1].length; html+=`<h${l}>${mdInline(h[2])}</h${l}>`; i++; continue; }
    if (/^\s*(-{3,}|\*{3,}|_{3,})\s*$/.test(line)){ html+='<hr>'; i++; continue; }
    if (/^\s*>/.test(line)){ const buf=[]; while(i<lines.length&&/^\s*>/.test(lines[i])){buf.push(lines[i].replace(/^\s*>\s?/,''));i++;} html+='<blockquote>'+fallbackMarkdown(buf.join('\n'))+'</blockquote>'; continue; }
    if (/^\s*[-*+]\s+/.test(line)){ const buf=[]; while(i<lines.length&&/^\s*[-*+]\s+/.test(lines[i])){buf.push('<li>'+mdInline(lines[i].replace(/^\s*[-*+]\s+/,''))+'</li>');i++;} html+='<ul>'+buf.join('')+'</ul>'; continue; }
    if (/^\s*\d+\.\s+/.test(line)){ const buf=[]; while(i<lines.length&&/^\s*\d+\.\s+/.test(lines[i])){buf.push('<li>'+mdInline(lines[i].replace(/^\s*\d+\.\s+/,''))+'</li>');i++;} html+='<ol>'+buf.join('')+'</ol>'; continue; }
    if (/^\s*$/.test(line)){ i++; continue; }
    const buf=[]; while(i<lines.length&&!brk(lines[i])){buf.push(lines[i].replace(/\s+$/,''));i++;}
    html+='<p>'+mdInline(buf.join(' '))+'</p>';
  }
  return html;
}
function renderMarkdownHTML(src){
  if (window.marked && typeof marked.parse === 'function') {
    try { return marked.parse(src, { breaks: false, gfm: true }); } catch(e){}
  }
  return fallbackMarkdown(src);
}
// Load marked.js without blocking render; re-render md cells once it arrives.
function loadMarked(){
  if (window.marked) return;
  const s = document.createElement('script');
  s.src = 'https://cdn.jsdelivr.net/npm/marked@9.1.6/marked.min.js';
  s.async = true;
  s.onload = () => refreshMarkdownCells();
  s.onerror = () => {};
  document.head.appendChild(s);
}
function refreshMarkdownCells(){
  $$('.cell').forEach(el => {
    const c = nb.doc.cells.find(x => x.id === +el.dataset.id);
    if (c && c.type === 'md' && !el.classList.contains('md-edit')) renderMd(el, c);
  });
}

/* ════════════════════════════════════════════════════════════════════════════
 * 3. STATE + PERSISTENCE
 * ════════════════════════════════════════════════════════════════════════════ */
const LS = { doc:'engine.html:main.lua', hist:'engine.html:history', assets:'engine.html:assets', theme:'engine.html:theme', opts:'engine.html:opts' };
const SEED = `--[[
# Gamengine

Welcome. This prose is a **Markdown cell** — in the file it's just a top-level
block comment, so main.lua stays a real, runnable LÖVE game the whole time.

- Edit cells on the left, watch the game render on the right.
- Toggle any cell between **Lua** and **Markdown** — it's only comment / uncomment.
- Export a \`.love\` that also runs in desktop LÖVE.
]]
function love.load()
  ball = { x = 200, y = 150, dx = 150, dy = 110, r = 9 }
  t = 0
end
-- %%
function love.update(dt)
  t = t + dt
  ball.x = ball.x + ball.dx * dt
  ball.y = ball.y + ball.dy * dt
  if ball.x < ball.r or ball.x > 400 - ball.r then ball.dx = -ball.dx end
  if ball.y < ball.r or ball.y > 300 - ball.r then ball.dy = -ball.dy end
end
-- %%
function love.draw()
  love.graphics.clear(0.07, 0.07, 0.07)
  love.graphics.setColor(0.85, 0.18, 0.55)
  love.graphics.circle('fill', ball.x, ball.y, ball.r)
  love.graphics.setColor(1, 1, 1)
  love.graphics.print('Gamengine  ' .. string.format('%.1f', t) .. 's', 10, 10)
end
`;

const nb = {
  doc: { cells: [], trailing: '' },
  dirty: false,
  opts: { lineNumbers: false },
  editor: { cm: null, views: new Map(), focusNew: new Set() },
  runtime: 'idle',
};

function lsGet(k,d){ try { const v=localStorage.getItem(k); return v==null?d:v; } catch(e){ return d; } }
function lsSet(k,v){ try { localStorage.setItem(k,v); } catch(e){} }

function loadDoc(){ nb.doc = parse(lsGet(LS.doc, SEED)); }
function saveDoc(snapshot){
  const src = serialize(nb.doc);
  lsSet(LS.doc, src);
  if (snapshot) pushHistory(src);
  setDirty(false);
}
let _saveTimer=null;
function saveSoon(){ clearTimeout(_saveTimer); _saveTimer=setTimeout(()=>saveDoc(false),600); }
function setDirty(v){ nb.dirty=v; const el=$('#st-save'); el.textContent=v?'Unsaved':'Saved'; el.classList.toggle('dirty',v); }

// history
function readHistory(){ try { return JSON.parse(lsGet(LS.hist,'[]')); } catch(e){ return []; } }
function pushHistory(src){
  const h=readHistory();
  if (h.length && h[0].src===src) return;
  h.unshift({ t: nowMs(), src });
  while (h.length>30) h.pop();
  lsSet(LS.hist, JSON.stringify(h)); renderHistory();
}
let _clock = 0;
function nowMs(){ return (typeof performance!=='undefined' && performance.timeOrigin) ? Math.round(performance.timeOrigin+performance.now()) : (++_clock); }
function relTime(t){ const s=Math.round((nowMs()-t)/1000); if(s<60)return s+'s ago'; if(s<3600)return Math.round(s/60)+'m ago'; if(s<86400)return Math.round(s/3600)+'h ago'; return Math.round(s/86400)+'d ago'; }
function renderHistory(){
  const wrap=$('#hist-list'); wrap.innerHTML='';
  const h=readHistory();
  if (!h.length){ wrap.appendChild(elem('div',{class:'pane-empty',text:'No snapshots yet'})); return; }
  h.forEach((e,idx)=>{
    wrap.appendChild(elem('div',{class:'list-row clickable',title:'Restore this snapshot',
      onclick:()=>{ if(confirm('Restore snapshot? Current state is snapshotted first.')){ saveDoc(true); nb.doc=parse(e.src); setDirty(true); renderNotebook(); } }},
      [ elem('span',{class:'grow',html:(idx===0?'● ':'')+relTime(e.t)}), elem('span',{class:'sub',text:(e.src.length+' B')}) ]));
  });
}

// assets
function readAssets(){ try { return JSON.parse(lsGet(LS.assets,'[]')); } catch(e){ return []; } }
function writeAssets(a){ lsSet(LS.assets, JSON.stringify(a)); renderAssets(); }
function renderAssets(){
  const wrap=$('#asset-list'); wrap.innerHTML='';
  const a=readAssets();
  if (!a.length){ wrap.appendChild(elem('div',{class:'pane-empty',text:'No assets. + to add sprites / audio.'})); return; }
  a.forEach(x=>{
    const x2=elem('span',{class:'x',title:'Remove',html:svg('trash')});
    x2.onclick=()=>writeAssets(readAssets().filter(y=>y.name!==x.name));
    wrap.appendChild(elem('div',{class:'list-row',title:x.name},
      [ elem('span',{class:'grow mono',text:x.name}), elem('span',{class:'sub',text:fmtBytes(x.size||0)}), x2 ]));
  });
}
function fmtBytes(n){ if(n<1024)return n+' B'; if(n<1048576)return (n/1024).toFixed(1)+' KB'; return (n/1048576).toFixed(1)+' MB'; }
function addAssets(fileList){
  const a=readAssets(); let pending=fileList.length; if(!pending)return;
  Array.from(fileList).forEach(file=>{
    const r=new FileReader();
    r.onload=()=>{ const rec={name:file.name,dataURL:r.result,size:file.size}; const i=a.findIndex(z=>z.name===file.name); if(i>=0)a[i]=rec; else a.push(rec); if(--pending===0){ writeAssets(a); toast(fileList.length+' asset(s) added'); } };
    r.readAsDataURL(file);
  });
}
function dataURLtoBytes(d){ const b=atob(d.slice(d.indexOf(',')+1)); const u=new Uint8Array(b.length); for(let i=0;i<b.length;i++)u[i]=b.charCodeAt(i); return u; }

/* ════════════════════════════════════════════════════════════════════════════
 * 4. THEME
 * ════════════════════════════════════════════════════════════════════════════ */
function getTheme(){ try { return JSON.parse(lsGet(LS.theme,'null')) || { mode:'auto', tone:'warm' }; } catch(e){ return { mode:'auto', tone:'warm' }; } }
function setTheme(t){ lsSet(LS.theme, JSON.stringify(t)); applyTheme(); }
const THEMES = { warm:{light:'linen',dark:'ember'}, cool:{light:'slate',dark:'dusk'}, neutral:{light:'cloud',dark:'carbon'} };
function applyTheme(){
  const t=getTheme();
  let dark = t.mode==='dark' || (t.mode==='auto' && window.matchMedia('(prefers-color-scheme: dark)').matches);
  const name = THEMES[t.tone][dark?'dark':'light'];
  document.documentElement.setAttribute('data-theme', name);
  $$('#seg-mode button').forEach(b=>b.classList.toggle('active', b.dataset.mode===t.mode));
  $$('#seg-tone button').forEach(b=>b.classList.toggle('active', b.dataset.tone===t.tone));
  const stt=$('#st-theme'); if(stt) stt.textContent=name;
  if (nb.editor.cm) refreshEditorThemes();
}
window.matchMedia('(prefers-color-scheme: dark)').addEventListener('change', ()=>{ if(getTheme().mode==='auto') applyTheme(); });

/* ════════════════════════════════════════════════════════════════════════════
 * 5. CODEMIRROR 6 (Lua) — loaded on demand; textarea is the fallback.
 * ════════════════════════════════════════════════════════════════════════════ */
async function loadCM(){
  if (nb.editor.cm) return nb.editor.cm;
  if (nb.editor.cm === false) return null;
  try {
    const [view,state,commands,language,autocomplete,luaMode,lezer] = await Promise.all([
      import('@codemirror/view'), import('@codemirror/state'), import('@codemirror/commands'),
      import('@codemirror/language'), import('@codemirror/autocomplete'),
      import('@codemirror/legacy-modes/mode/lua'), import('@lezer/highlight'),
    ]);
    const { EditorView } = view;
    const { HighlightStyle, syntaxHighlighting, StreamLanguage } = language;
    const { tags } = lezer;
    const theme = EditorView.theme({
      '&': { fontSize:'13px', fontFamily:'var(--font-mono)', lineHeight:'1.65', background:'var(--bg-primary)', color:'var(--text-primary)' },
      '&.cm-focused': { outline:'none' },
      '.cm-content': { padding:'11px 13px', minHeight:'52px', caretColor:'var(--border-info)', fontFamily:'inherit' },
      '.cm-scroller': { fontFamily:'inherit' },
      '.cm-cursor, .cm-dropCursor': { borderLeftColor:'var(--border-info)', borderLeftWidth:'2px' },
      '&.cm-focused .cm-selectionBackground, .cm-selectionBackground': { background:'var(--bg-tertiary)' },
      '.cm-activeLine': { background:'var(--bg-secondary)' },
      '.cm-gutters': { background:'var(--bg-primary)', borderRight:'1px solid var(--border-faint)', color:'var(--text-tertiary)' },
    });
    const highlight = syntaxHighlighting(HighlightStyle.define([
      { tag:[tags.keyword,tags.definitionKeyword,tags.controlKeyword,tags.operatorKeyword], color:'var(--syntax-keyword)' },
      { tag:[tags.string,tags.special(tags.string)], color:'var(--syntax-string)' },
      { tag:[tags.number,tags.bool,tags.atom], color:'var(--syntax-string)' },
      { tag:[tags.operator,tags.punctuation], color:'var(--syntax-operator)' },
      { tag:tags.comment, color:'var(--text-tertiary)', fontStyle:'italic' },
      { tag:[tags.variableName,tags.propertyName,tags.function(tags.variableName)], color:'var(--text-primary)' },
    ]));
    nb.editor.cm = { view, state, commands, language, autocomplete, lua: StreamLanguage.define(luaMode.lua), theme, highlight };
    return nb.editor.cm;
  } catch(e){
    nb.editor.cm = false;
    logConsole('CodeMirror unavailable (offline?) — using plain editor.', 'dim');
    return null;
  }
}
function refreshEditorThemes(){ /* CM reads CSS vars live; nothing to do */ }

async function upgradeEditor(cellEl, cell){
  if (nb.editor.views.has(cell.id)) return;
  const m = await loadCM();
  if (!m) return;
  const wrap = cellEl.querySelector('.cell-editor');
  const ta = wrap && wrap.querySelector('textarea');
  if (!ta) return;
  const { EditorView, keymap, drawSelection, highlightActiveLine, lineNumbers } = m.view;
  const { defaultKeymap, indentWithTab, history, historyKeymap } = m.commands;
  const { indentOnInput, bracketMatching } = m.language;
  const { closeBrackets, closeBracketsKeymap } = m.autocomplete;
  const view = new EditorView({
    doc: cell.code,
    extensions: [
      m.theme, m.highlight, m.lua,
      nb.opts.lineNumbers ? lineNumbers() : [],
      history(), drawSelection(), highlightActiveLine(), indentOnInput(), bracketMatching(), closeBrackets(),
      EditorView.lineWrapping,
      keymap.of([ ...closeBracketsKeymap, ...defaultKeymap, ...historyKeymap, indentWithTab ]),
      EditorView.updateListener.of(u=>{
        if (u.docChanged){ cell.code=u.state.doc.toString(); setDirty(true); saveSoon(); updateCellTitle(cellEl,cell); }
        if (u.focusChanged) cellEl.classList.toggle('focused', u.view.hasFocus);
      }),
    ],
    parent: wrap,
  });
  ta.remove();
  nb.editor.views.set(cell.id, view);
  if (nb.editor.focusNew.delete(cell.id)) view.focus();
}
async function upgradeAllEditors(){
  if (!(await loadCM())) return;
  $$('.cell').forEach(el=>{ const c=nb.doc.cells.find(x=>x.id===+el.dataset.id); if(c && c.type==='lua') upgradeEditor(el,c); });
}
function cellCode(cell){ const v=nb.editor.views.get(cell.id); return v ? v.state.doc.toString() : cell.code; }
function syncFromEditors(){ nb.doc.cells.forEach(c=>{ const v=nb.editor.views.get(c.id); if(v) c.code=v.state.doc.toString(); }); }

/* ════════════════════════════════════════════════════════════════════════════
 * 6. CELL DOM
 * ════════════════════════════════════════════════════════════════════════════ */
const BADGE = { lua:'Lua', md:'Markdown' };
function firstLine(s){ const l=(s||'').split('\n').find(x=>x.trim()); return (l||'').trim().slice(0,60); }
function updateCellTitle(cellEl, cell){
  const t=cellEl.querySelector('.cell-title');
  if (t) t.textContent = cell.type==='md' ? firstLine(cell.code).replace(/^#+\s*/,'') : firstLine(cell.code);
}
function createInsertZone(index){
  const lua=elem('button',{class:'insert-btn type-lua',html:svg('code')+' Lua',onclick:()=>addCell('lua',index())});
  const md =elem('button',{class:'insert-btn type-md',html:svg('md')+' Markdown',onclick:()=>addCell('md',index())});
  return elem('div',{class:'cell-insert'},[lua,md]);
}
function renderMd(cellEl, cell){
  const out=cellEl.querySelector('.cell-output');
  out.className='cell-output out-md';
  out.innerHTML = cell.code.trim()? renderMarkdownHTML(cell.code) : '';
  cellEl.classList.remove('md-edit'); cellEl.classList.add('md-view');
}
function createCellEl(cell){
  const badge=elem('span',{class:'cell-badge badge-'+cell.type,text:BADGE[cell.type],title:'Switch cell type'});
  badge.onclick=(e)=>openTypePicker(badge,cell);
  const title=elem('span',{class:'cell-title'});
  const actions=elem('div',{class:'cell-actions'},[
    mkAction('up','Move up',()=>moveCell(cell.id,-1)),
    mkAction('down','Move down',()=>moveCell(cell.id,1)),
    mkAction('chevron','Collapse',()=>toggleCollapse(cell.id),'collapse-btn'),
    mkAction('trash','Delete',()=>deleteCell(cell.id),'danger'),
  ]);
  const header=elem('div',{class:'cell-header'},[badge,title,actions]);

  const body=elem('div',{class:'cell-editor'});
  const out=elem('div',{class:'cell-output'});
  const cellEl=elem('div',{class:'cell','data-id':cell.id},[header,body,out]);
  if (cell.collapsed) cellEl.classList.add('collapsed');

  if (cell.type==='lua'){
    const ta=elem('textarea',{spellcheck:'false'}); ta.value=cell.code;
    ta.addEventListener('input',()=>{ cell.code=ta.value; autosize(ta); setDirty(true); saveSoon(); updateCellTitle(cellEl,cell); });
    ta.addEventListener('focus',()=>cellEl.classList.add('focused'));
    ta.addEventListener('blur',()=>cellEl.classList.remove('focused'));
    ta.addEventListener('keydown',e=>editorKeys(e,ta,cell));
    body.appendChild(ta); setTimeout(()=>autosize(ta),0);
    setTimeout(()=>upgradeEditor(cellEl,cell),0);
  } else {
    const ta=elem('textarea',{spellcheck:'false'}); ta.value=cell.code;
    ta.addEventListener('input',()=>{ cell.code=ta.value; autosize(ta); setDirty(true); saveSoon(); });
    ta.addEventListener('blur',()=>{ cell.code=ta.value; renderMd(cellEl,cell); setDirty(true); saveSoon(); updateCellTitle(cellEl,cell); });
    ta.addEventListener('keydown',e=>editorKeys(e,ta,cell));
    body.appendChild(ta);
    out.addEventListener('click',()=>{ if(cellEl.classList.contains('collapsed'))return; cellEl.classList.remove('md-view'); cellEl.classList.add('md-edit'); autosize(ta); ta.focus(); });
    renderMd(cellEl,cell);
  }
  updateCellTitle(cellEl,cell);
  return cellEl;
}
function mkAction(ico,title,fn,cls){ const b=elem('button',{class:'ca-btn'+(cls?' '+cls:''),title,html:svg(ico)}); b.onclick=fn; return b; }
function autosize(ta){ ta.style.height='auto'; ta.style.height=(ta.scrollHeight+2)+'px'; }
function editorKeys(e,ta,cell){
  if (e.key==='Tab'){ e.preventDefault(); const s=ta.selectionStart,en=ta.selectionEnd; ta.value=ta.value.slice(0,s)+'  '+ta.value.slice(en); ta.selectionStart=ta.selectionEnd=s+2; cell.code=ta.value; autosize(ta); setDirty(true); saveSoon(); }
  if (e.key==='Enter' && (e.metaKey||e.ctrlKey)){ e.preventDefault(); run(); }
}

function openTypePicker(badge, cell){
  document.querySelectorAll('.type-picker').forEach(p=>p.remove());
  const picker=elem('div',{class:'type-picker'});
  ['lua','md'].filter(t=>t!==cell.type).forEach(t=>{
    const b=elem('button',{class:'type-picker-btn',html:svg(t==='lua'?'code':'md')+'<span>'+BADGE[t]+'</span>'});
    b.addEventListener('mousedown',ev=>{ ev.stopPropagation(); picker.remove(); convertType(cell.id,t); });
    picker.appendChild(b);
  });
  document.body.appendChild(picker);
  const r=badge.getBoundingClientRect(); picker.style.top=(r.bottom+4)+'px'; picker.style.left=r.left+'px';
  const dismiss=e=>{ if(!picker.contains(e.target)&&e.target!==badge){ picker.remove(); document.removeEventListener('mousedown',dismiss); } };
  setTimeout(()=>document.addEventListener('mousedown',dismiss),0);
}

// full re-render (used on load, structural ops, restore)
function renderNotebook(){
  syncFromEditors();
  nb.editor.views.forEach(v=>{ try{v.destroy();}catch(e){} }); nb.editor.views.clear();
  const scroll=$('#nb-scroll'); scroll.innerHTML='';
  const indexOfId=id=>nb.doc.cells.findIndex(c=>c.id===id);
  scroll.appendChild(createInsertZone(()=>0));
  nb.doc.cells.forEach((cell)=>{
    scroll.appendChild(createCellEl(cell));
    scroll.appendChild(createInsertZone(()=>indexOfId(cell.id)+1));
  });
  $('#st-cells').textContent = nb.doc.cells.length+' cell'+(nb.doc.cells.length===1?'':'s');
  saveSoon();
}

/* structural ops */
function newCell(type){ return { id:uid(), type, code:'', level:0, before:'', collapsed:false }; }
function addCell(type, at){
  const c=newCell(type);
  if (at==null||at<0||at>nb.doc.cells.length) nb.doc.cells.push(c); else nb.doc.cells.splice(at,0,c);
  normalizeGlue(nb.doc); nb.editor.focusNew.add(c.id); setDirty(true); renderNotebook();
}
function deleteCell(id){
  const i=nb.doc.cells.findIndex(c=>c.id===id); if(i<0)return;
  if (nb.doc.cells.length===1 && !confirm('Delete the only cell?')) return;
  nb.doc.cells.splice(i,1); normalizeGlue(nb.doc); setDirty(true); renderNotebook();
}
function moveCell(id,dir){
  const i=nb.doc.cells.findIndex(c=>c.id===id), j=i+dir; if(j<0||j>=nb.doc.cells.length)return;
  syncFromEditors();
  const [c]=nb.doc.cells.splice(i,1); nb.doc.cells.splice(j,0,c);
  normalizeGlue(nb.doc); setDirty(true); renderNotebook();
}
function convertType(id,t){
  const c=nb.doc.cells.find(x=>x.id===id); if(!c)return;
  syncFromEditors(); c.type=t; if(t==='md')c.level=0;
  normalizeGlue(nb.doc); setDirty(true); renderNotebook();
}
function toggleCollapse(id){
  const c=nb.doc.cells.find(x=>x.id===id); if(!c)return;
  c.collapsed=!c.collapsed;
  const el=$(`.cell[data-id="${id}"]`); if(el) el.classList.toggle('collapsed',c.collapsed);
}
function collapseAll(){
  const anyOpen=nb.doc.cells.some(c=>!c.collapsed);
  nb.doc.cells.forEach(c=>c.collapsed=anyOpen);
  $$('.cell').forEach(el=>el.classList.toggle('collapsed',anyOpen));
}

/* ════════════════════════════════════════════════════════════════════════════
 * 7. RUNTIME — build a .love in-browser, boot it with 2dengine/love.js.
 *
 *   love.js needs SharedArrayBuffer => the page must be cross-origin isolated.
 *   The bundled coi-serviceworker.js (registered at boot when present) grants
 *   that on any https/localhost host with no server config. The preview runs in
 *   a fresh <iframe> per run, which is a clean "recreate the Module" each time.
 * ════════════════════════════════════════════════════════════════════════════ */
const RT = {
  JSZIP: 'https://cdn.jsdelivr.net/npm/jszip@3.10.1/dist/jszip.min.js',
  BASE: 'https://cdn.jsdelivr.net/gh/2dengine/love.js@master/',
  get PLAYER(){ return this.BASE + 'player.js'; },
  VERSION: '11.5',
};
function setRuntime(state, label){
  nb.runtime=state; const el=$('#st-runtime');
  el.className='status-item'+(state==='loading'||state==='running'?' working':state==='error'?' error':state==='ready'?' ready':'');
  el.innerHTML=svg('dot')+' '+(label||('Runtime: '+state));
}
function showConsole(show){ const c=$('#console'); c.classList.toggle('hidden', show===false ? true : (show===true?false:!c.classList.contains('hidden')?true:false)); }
function logConsole(msg,cls){ const c=$('#console'); c.classList.remove('hidden'); c.appendChild(elem('div',{class:cls||'',text:msg})); c.scrollTop=c.scrollHeight; }
function clearConsole(){ $('#console').innerHTML=''; }

let _jszip=null;
function loadJSZip(){
  if (window.JSZip) return Promise.resolve(window.JSZip);
  if (_jszip) return _jszip;
  _jszip=new Promise((res,rej)=>{ const s=document.createElement('script'); s.src=RT.JSZIP; s.onload=()=>res(window.JSZip); s.onerror=()=>rej(new Error('Could not load JSZip (offline / blocked CDN).')); document.head.appendChild(s); });
  return _jszip;
}
async function buildLoveBlob(){
  syncFromEditors();
  const JSZip=await loadJSZip();
  const zip=new JSZip();
  zip.file('main.lua', serialize(nb.doc));
  for (const a of readAssets()) zip.file(a.name, dataURLtoBytes(a.dataURL));
  return zip.generateAsync({ type:'blob', compression:'DEFLATE' });
}
function isolated(){ return (typeof SharedArrayBuffer!=='undefined') && (window.crossOriginIsolated!==false); }

let _loveUrl=null, _docUrl=null;
function revokeUrls(){ if(_loveUrl){URL.revokeObjectURL(_loveUrl);_loveUrl=null;} if(_docUrl){URL.revokeObjectURL(_docUrl);_docUrl=null;} }
function playerHTML(loveUrl){
  const o='<scr'+'ipt', c='</scr'+'ipt>';
  const purl = JSON.stringify(RT.PLAYER+'?g='+encodeURIComponent(loveUrl)+'&v='+RT.VERSION);
  // Diagnostic bridge: forward the iframe's console, errors, *resource-load
  // failures* (capture phase — these don't bubble to window), and its own
  // isolation status up to the engine.html preview console via postMessage.
  // It also injects player.js with explicit onload/onerror so a 404 on the
  // loader (or the love.js/love.wasm it pulls) is visible instead of a silent hang.
  const diag = o+'>'
    + '(function(){var P=function(k,m){try{parent.postMessage({__love:k,msg:String(m).slice(0,600)},"*")}catch(e){}};'
    + '["log","info","warn","error"].forEach(function(k){var f=console[k]?console[k].bind(console):function(){};console[k]=function(){var a=[].slice.call(arguments).map(function(x){return (x&&x.message)||x}).join(" ");P(k==="error"?"err":k==="warn"?"warn":"out",a);f.apply(null,arguments)}});'
    + 'addEventListener("error",function(e){var t=e.target;if(t&&(t.src||t.href)){P("err","failed to load: "+(t.src||t.href))}else{P("err",(e.message||"error")+(e.filename?" @"+(""+e.filename).split("/").pop()+":"+e.lineno:""))}},true);'
    + 'addEventListener("unhandledrejection",function(e){P("err","unhandled: "+((e.reason&&e.reason.message)||e.reason))});'
    + 'P("out","iframe crossOriginIsolated="+self.crossOriginIsolated+", SharedArrayBuffer="+(typeof SharedArrayBuffer!=="undefined"));'
    + 'var PURL='+purl+';P("out","loading "+PURL.split("?")[0]);'
    + 'var s=document.createElement("script");s.src=PURL;s.crossOrigin="anonymous";'
    + 's.onload=function(){P("out","player.js loaded; love.js should follow…")};'
    + 's.onerror=function(){P("err","player.js FAILED to load (404 / blocked): "+s.src)};'
    + 'document.body.appendChild(s);'
    + 'var n=0,iv=setInterval(function(){var cv=document.getElementById("canvas");if(cv&&cv.width>1&&cv.height>1){clearInterval(iv);P("status","running")}else if(++n>240){clearInterval(iv)}},250);'
    + '})();'+c;
  // player.js fetches its engine files (lua/normalize*.lua, 11.5/love.wasm,
  // love.worker.js) as RELATIVE URLs. The iframe doc is a blob: URL, against
  // which relative URLs can't be parsed — so we set <base> to the 2dengine CDN
  // dir so those resolve to where the files actually live.
  return '<!doctype html><html><head><meta charset="utf-8"><base href="'+RT.BASE+'"><style>html,body{margin:0;height:100%;background:#000;overflow:hidden}canvas{display:block;margin:auto}</style></head><body>'
    + '<canvas id="canvas" oncontextmenu="event.preventDefault()"></canvas>'
    + diag + '</body></html>';
}
function hookLoveMessages(){
  if (window._loveMsgHook) return; window._loveMsgHook = true;
  window.addEventListener('message', e=>{
    const d=e.data; if(!d || typeof d!=='object' || !('__love' in d)) return;
    if (d.__love==='status' && d.msg==='running'){
      setRuntime('running','Runtime: running');
      logConsole('Running — click the canvas for keyboard/mouse focus.','ok');
      return;
    }
    logConsole('[love] '+d.msg, d.__love==='err'?'err':d.__love==='warn'?'warn':'dim');
  });
}
async function run(){
  saveDoc(true);
  clearConsole(); showConsole(true);
  if (!isolated()){
    setRuntime('error','Runtime: needs isolation');
    showPlaceholder();
    logConsole('Live preview needs cross-origin isolation (SharedArrayBuffer).','err');
    if (location.protocol==='file:'){
      logConsole('You are on file:// — love.js can’t run here (no SharedArrayBuffer).','warn');
      logConsole('Serve it from a localhost server (with coi-serviceworker.js alongside):','dim');
      logConsole('  python3 -m http.server   →   http://localhost:8000/engine.html','dim');
      logConsole('or host it (e.g. GitHub Pages); the bundled service worker isolates it.','dim');
    } else {
      logConsole('Add coi-serviceworker.js next to engine.html (it is in this repo), or','dim');
      logConsole('serve with COOP: same-origin + COEP: require-corp, then reload.','dim');
    }
    logConsole('Export still works and runs in desktop LÖVE regardless.','dim');
    return;
  }
  setRuntime('loading','Runtime: building .love');
  let blob; try { blob=await buildLoveBlob(); } catch(e){ setRuntime('error'); logConsole(String(e.message||e),'err'); return; }
  setRuntime('loading','Runtime: booting love.js');
  logConsole('Built .love ('+fmtBytes(blob.size)+'). Booting love.js '+RT.VERSION+'… (first run downloads the WASM)','dim');
  hookLoveMessages();
  revokeUrls();
  _loveUrl=URL.createObjectURL(blob);
  _docUrl=URL.createObjectURL(new Blob([playerHTML(_loveUrl)],{type:'text/html'}));
  const stage=$('#stage'); const old=stage.querySelector('iframe'); if(old)old.remove();
  hidePlaceholder();
  const frame=elem('iframe',{src:_docUrl,allow:'autoplay; fullscreen; gamepad'});
  frame.onload=()=>{ setRuntime('loading','Runtime: booting'); logConsole('Player frame loaded — booting love.js…','dim'); };
  stage.appendChild(frame);
}
function stopPreview(){ const f=$('#stage').querySelector('iframe'); if(f)f.remove(); revokeUrls(); showPlaceholder(); setRuntime('idle'); logConsole('Stopped.','dim'); }
function showPlaceholder(){ const p=$('#placeholder'); if(p){ $('#stage').appendChild(p); p.style.display=''; } }
function hidePlaceholder(){ const p=$('#placeholder'); if(p)p.style.display='none'; }

/* ════════════════════════════════════════════════════════════════════════════
 * 8. EXPORT
 * ════════════════════════════════════════════════════════════════════════════ */
async function exportLove(){
  try { const blob=await buildLoveBlob(); download(blob,'game.love'); toast('Exported game.love'); }
  catch(e){ alert('Export failed: '+(e.message||e)); }
}
function download(blob,name){ const u=URL.createObjectURL(blob); const a=elem('a',{href:u,download:name}); document.body.appendChild(a); a.click(); a.remove(); setTimeout(()=>URL.revokeObjectURL(u),1000); }
function downloadText(text,name){ download(new Blob([text],{type:'text/x-lua'}),name); }

/* ════════════════════════════════════════════════════════════════════════════
 * 9. SELF-TESTS — doc-model round-trip / toggle / separator invariants.
 * ════════════════════════════════════════════════════════════════════════════ */
function runSelfTests(){
  const samples=[SEED,'','print("hi")','print("hi")\n','--[[ md ]]\n','--[[\nmulti\nline\n]]\n-- %%\nlocal x=1\n',
    'a=1\n-- %%\nb=2\n-- %%\nc=3\n','--[==[ has ]] inside ]==]\nfoo()\n','function f()\n  --[[ indented stays lua ]]\n  return 1\nend\n',
    '\n\n--[[a]]\n\n\nbar()\n\n','-- %%\nlocal lead=1\n','--[[x]]\n--[[y]]\n','a()\n--[[ md ]]\nb()\n'];
  const res=[]; let pass=0;
  samples.forEach((src,i)=>{ let ok=false,note=''; try{ const out=serialize(parse(src)); ok=out===src; if(!ok)note='mismatch'; }catch(e){note='threw '+e.message;} res.push({n:'roundtrip #'+i,ok,note}); if(ok)pass++; });
  // toggle lua->md->lua preserves content
  try { const c={id:1,type:'lua',code:'local z=42',level:0,before:''}; c.type='md'; c.type='lua'; const ok=c.code==='local z=42'; res.push({n:'toggle preserves content',ok,note:''}); if(ok)pass++; } catch(e){ res.push({n:'toggle',ok:false,note:e.message}); }
  // adjacent lua cells keep separator
  try { const d={cells:[newCell('lua'),newCell('lua')],trailing:'\n'}; d.cells[0].code='a()'; d.cells[1].code='b()'; normalizeGlue(d); const re=parse(serialize(d)); const ok=re.cells.length===2&&re.cells.every(c=>c.type==='lua'); res.push({n:'adjacent lua keep separator',ok,note:'got '+re.cells.length}); if(ok)pass++; } catch(e){ res.push({n:'separator',ok:false,note:e.message}); }
  clearConsole(); showConsole(true);
  logConsole('Self-tests: '+pass+'/'+res.length+' passed', pass===res.length?'ok':'err');
  res.forEach(r=>logConsole((r.ok?'  ✓ ':'  ✗ ')+r.n+(r.note?'  — '+r.note:''), r.ok?'dim':'err'));
  toast(pass===res.length?('All '+res.length+' tests passed'):(res.length-pass)+' test(s) failed');
  return pass===res.length;
}

/* ════════════════════════════════════════════════════════════════════════════
 * 10. WIRING + BOOT
 * ════════════════════════════════════════════════════════════════════════════ */
function switchTab(name){
  $$('#left-activity-bar .activity-bar-btn').forEach(b=>b.classList.toggle('active',b.dataset.tab===name));
  $$('#left-pane .pane-panel').forEach(p=>p.classList.toggle('active',p.dataset.tab===name));
}
function makeResizer(handle, pane, side){
  let startX=0,startW=0,drag=false;
  handle.addEventListener('mousedown',e=>{ drag=true; startX=e.clientX; startW=pane.getBoundingClientRect().width; handle.classList.add('dragging'); document.body.style.cursor='col-resize'; e.preventDefault(); });
  window.addEventListener('mousemove',e=>{ if(!drag)return; const dx=e.clientX-startX; let w=side==='left'?startW+dx:startW-dx; w=Math.max(0,Math.min(w,window.innerWidth*0.7)); pane.style.width=w+'px'; });
  window.addEventListener('mouseup',()=>{ if(drag){drag=false; handle.classList.remove('dragging'); document.body.style.cursor='';} });
}
function wire(){
  $('#btn-run').onclick=run;
  $('#btn-stop').onclick=stopPreview;
  $('#btn-export').onclick=exportLove;
  $('#btn-tests').onclick=runSelfTests;
  $('#btn-collapse-all').onclick=collapseAll;
  $('#btn-new').onclick=()=>{ if(confirm('Start a new main.lua? Current state is snapshotted first.')){ saveDoc(true); nb.doc=parse(SEED); setDirty(true); renderNotebook(); } };
  $('#btn-save').onclick=()=>{ saveDoc(true); downloadText(serialize(nb.doc),'main.lua'); toast('Saved main.lua'); };
  $('#btn-open').onclick=()=>$('#file-input').click();
  $('#file-input').onchange=e=>{ const f=e.target.files[0]; if(!f)return; const r=new FileReader(); r.onload=()=>{ saveDoc(true); nb.doc=parse(r.result); setDirty(true); renderNotebook(); toast('Opened '+f.name); }; r.readAsText(f); e.target.value=''; };
  $('#add-asset').onclick=()=>$('#asset-input').click();
  $('#asset-input').onchange=e=>{ addAssets(e.target.files); e.target.value=''; };
  $('#snap-now').onclick=()=>{ saveDoc(true); toast('Snapshot saved'); };
  $('#toggle-console').onclick=()=>showConsole();
  $('#st-theme').onclick=()=>switchTab('settings');
  $$('#left-activity-bar .activity-bar-btn').forEach(b=>b.onclick=()=>switchTab(b.dataset.tab));
  $$('#seg-mode button').forEach(b=>b.onclick=()=>{ const t=getTheme(); t.mode=b.dataset.mode; setTheme(t); });
  $$('#seg-tone button').forEach(b=>b.onclick=()=>{ const t=getTheme(); t.tone=b.dataset.tone; setTheme(t); });
  const ln=$('#opt-linenums'); ln.checked=nb.opts.lineNumbers; ln.onchange=()=>{ nb.opts.lineNumbers=ln.checked; lsSet(LS.opts,JSON.stringify(nb.opts)); renderNotebook(); };
  makeResizer($('#left-resizer'),$('#left-pane'),'left');
  makeResizer($('#right-resizer'),$('#right-pane'),'right');
  document.addEventListener('keydown',e=>{
    if ((e.metaKey||e.ctrlKey)&&e.key==='Enter'){ e.preventDefault(); run(); }
    if ((e.metaKey||e.ctrlKey)&&(e.key==='s'||e.key==='S')){ e.preventDefault(); saveDoc(true); downloadText(serialize(nb.doc),'main.lua'); toast('Saved main.lua'); }
  });
  window.addEventListener('beforeunload',()=>{ try{ syncFromEditors(); saveDoc(false); }catch(e){} });
}

function registerIsolationSW(){
  // Register the bundled coi-serviceworker.js if present, to grant cross-origin
  // isolation (needed by love.js) on https/localhost without server config.
  if (location.protocol==='file:' || isolated() || !('serviceWorker' in navigator)) return;
  const s=document.createElement('script'); s.src='coi-serviceworker.js'; s.onerror=()=>{}; document.head.appendChild(s);
}

function boot(){
  try { nb.opts = Object.assign(nb.opts, JSON.parse(lsGet(LS.opts,'{}'))); } catch(e){}
  $('#logo-mark').innerHTML=svg('love');
  $('#placeholder-icon').innerHTML=`<svg width="44" height="44" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">${I.play}</svg>`;
  paintIcons();
  applyTheme();
  loadDoc();
  wire();
  renderNotebook();
  renderAssets();
  renderHistory();
  setDirty(false);
  setRuntime('idle');
  loadMarked();
  registerIsolationSW();
  if (!isolated() && location.protocol!=='file:'){ setRuntime('idle','Runtime: idle (isolating…)'); }
  // try to upgrade Lua editors to CodeMirror (no-op if offline)
  upgradeAllEditors();
  // expose for console / oracle comparisons
  window.engine = { parse, serialize, normalizeGlue, renderMarkdownHTML, runSelfTests, get doc(){return nb.doc;} };
}
boot();
